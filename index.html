<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Historia🎵💗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --retro-pink: #ff71ce;
            --retro-blue: #01cdfe;
            --retro-purple: #b967ff;
            --tv-frame: #2a2a2a;
        }

        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'VT323', monospace;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle, #1a0b2e 0%, #050505 100%);
            overflow-x: hidden;
        }

        /* TV Container - Mobile Responsive */
        .tv-container {
            position: relative;
            width: 95vw;
            max-width: 700px;
            background: var(--tv-frame);
            border-radius: 30px;
            border: 8px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 20px rgba(185, 103, 255, 0.2);
            padding: 15px;
            display: flex;
            flex-direction: column;
            background-image: linear-gradient(145deg, #333, #111);
        }

        /* Screen Area */
        .screen {
            position: relative;
            width: 100%;
            aspect-ratio: 4/2.2,9;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            border: 5px solid #1a1a1a;
            box-shadow: inset 0 0 30px rgba(0,0,0,1);
        }

        /* Sutil resplandor de pantalla */
        .screen-glow {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 40px rgba(255,255,255,0.05);
            pointer-events: none;
            z-index: 5;
        }

        /* VHS Overlay Text */
        .vhs-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
            font-size: 1.2rem;
            text-shadow: 1px 1px #ff00de, -1px -1px #00eaff;
            z-index: 10;
            pointer-events: none;
            letter-spacing: 2px;
        }

        /* TV Bottom Controls */
        .tv-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 10px 5px 10px;
        }

        .speaker-area {
            display: flex;
            gap: 4px;
        }
        .vent {
            width: 4px;
            height: 20px;
            background: #111;
            border-radius: 2px;
        }

        .led-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: #ff4444;
        }

        .led {
            width: 8px;
            height: 8px;
            background: #ff0000;
            border-radius: 50%;
            box-shadow: 0 0 8px #ff0000;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .glitch-btn {
            background: var(--retro-purple);
            border: none;
            padding: 15px 30px;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 4px 4px 0px var(--retro-blue);
            text-transform: uppercase;
        }

        .glitch-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--retro-blue);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Para que no se corte el video original */
            background: black;
        }

        .hidden { display: none; }
        

        /* ===== IMÁGENES FLOTANTES ===== */
.decor{
  position:fixed;
  width:170px;
  opacity:.55;
  pointer-events:none;
  animation:floatY 10s ease-in-out infinite alternate;
  filter:drop-shadow(0 0 20px rgba(255,120,200,.3));
}

@keyframes floatY{
  0%{ transform:translateY(0) rotate(0deg); }
  100%{ transform:translateY(-30px) rotate(4deg); }
}

/* VELOCIDADES */
.slow{ animation-duration:6s; }
.medium{ animation-duration:8s; }
.fast{ animation-duration:10s; }

/* POSICIONES */
.pos-top-left{ top:8%; left:4%; }
.pos-middle-left{ top:75%; left:5%; }
.pos-top-right{ top:8%; right:5%; }
.pos-bottom-right{ bottom:10%; right:6%; }

      
    </style>
</head>
<body>

    <div id="start-screen" class="text-center p-6">
        <h1 class="text-5xl md:text-7xl mb-10 text-pink-500 italic font-bold" style="text-shadow: 4px 4px #01cdfe;">PARA TI💗</h1>
        <button onclick="startVideo()" class="glitch-btn">INSERTAR CINTA</button>
        <p class="mt-6 text-gray-400 text-lg">VHS📼</p>
    </div>

    <div id="tv-player" class="tv-container hidden">
        <div class="vhs-overlay">
            ▶ PLAY<br>
            <span id="vhs-time">00:00:00</span>
        </div>
        
        <div class="screen">
            <div class="screen-glow"></div>
            <!-- Controles habilitados para que ella pueda pausar/adelantar -->
            <video id="main-video" controls playsinline>
                <source id="video-source" src="" type="video/mp4">
                Tu celular no soporta este video.
            </video>
        </div>

        <div class="tv-footer">
            <div class="speaker-area">
                <div class="vent"></div>
                <div class="vent"></div>
                <div class="vent"></div>
                <div class="vent"></div>
                <div class="vent"></div>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="text-xs text-gray-500 uppercase tracking-widest">Hi-Fi Stereo</div>
                <div class="led-indicator">
                    <span class="led"></span>
                    <span>REC</span>
                </div>
            </div>
        </div>
        <!-- DECORACIONES -->
<img src="vhs.png" class="decor slow pos-top-left">
<img src="vhsvi.png" class="decor fast pos-middle-left">
<img src="vhscora.png" class="decor medium pos-top-right">
<img src="estrella.png" class="decor slow pos-bottom-right">

    </div>

    <script>
        // CONFIGURACIÓN: Escribe aquí el nombre de tu archivo si no quieres que pregunte.
        // Ejemplo: const NOMBRE_ARCHIVO_VIDEO = 'nuestra_historia.mp4';
        const NOMBRE_ARCHIVO_VIDEO = 'videomelo.mp4'; 

        function startVideo() {
            const videoElement = document.getElementById('main-video');
            const sourceElement = document.getElementById('video-source');
            
            let videoFile = NOMBRE_ARCHIVO_VIDEO;
            
            if (!videoFile) {
                videoFile = prompt("Escribe el nombre de tu video (ejemplo: video.mp4):");
            }

            if (videoFile) {
                sourceElement.src = videoFile;
                videoElement.load();
                
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('tv-player').classList.remove('hidden');
                
                // Intentar reproducción automática (puede fallar por políticas de navegador si no está muteado)
                videoElement.play().catch(error => {
                    console.log("Reproducción manual requerida.");
                });

                startTimeCounter();
            }
        }

        function startTimeCounter() {
            const timeElement = document.getElementById('vhs-time');
            let seconds = 0;
            
            setInterval(() => {
                const video = document.getElementById('main-video');
                // Sincronizar el reloj del VHS con el tiempo real del video
                if (!video.paused) {
                    let currentTime = Math.floor(video.currentTime);
                    let hrs = Math.floor(currentTime / 3600);
                    let mins = Math.floor((currentTime % 3600) / 60);
                    let secs = currentTime % 60;
                    
                    timeElement.innerText = 
                        `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }
        
    </script>
</body>
</html>
