<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Pau</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@300;500;700&display=swap');

        :root {
            --primary-pink: #ffafbd;
            --secondary-pink: #ffc3a0;
            --glass: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffafbd 30%, #3d75db 100%);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Partículas de fondo */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.4;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* Tarjeta compacta sin vacíos */
        .love-card {
            width: 90%;
            max-width: 360px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 35px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            padding: 24px;
            z-index: 10;
            /* Esta propiedad asegura que no se estire de más en móviles largos */
            align-self: center;
        }

        .romantic-title {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: white;
            text-align: center;
            margin-bottom: 16px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.1);
        }

        /* Contenedor de Video */
        .video-wrapper {
            width: 100%;
            aspect-ratio: 4 / 3.3;
            border-radius: 20px; 
            overflow: hidden;
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Overlay de Corazón */
        .heart-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 50px;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .is-paused .heart-overlay {
            opacity: 0.8;
            transform: translate(-50%, -50%) scale(1.1);
        }

        /* Barra de Progreso */
        .progress-area {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            margin: 20px 0;
            cursor: pointer;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px white;
        }

        /* Botones de Control */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-around;
            margin-top: 10px;
        }

        .btn-love {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ff8a9a;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-love:active {
            transform: scale(0.9);
        }

        .btn-main {
            width: 65px;
            height: 65px;
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            color: white;
            opacity: 0.8;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="particles" id="particles-container"></div>

    <div class="love-card" id="main-card">
        <h2 class="romantic-title">My Love</h2>
        
        <div class="video-wrapper" id="video-click-area">
            <video id="player" loop playsinline>
                <source src="videoga.mp4" type="video/mp4">
            </video>
            <div class="heart-overlay">❤️</div>
        </div>

        <div class="progress-area" id="seek-bar-container">
            <div class="progress-bar" id="seek-bar"></div>
        </div>

        <div class="controls-row">
            <div class="btn-love" onclick="toggleMute()">
                <svg id="vol-icon" width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18,19.86 21,16.28 21,12C21,7.72 18,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16.02C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z"/></svg>
            </div>
            
            <div class="btn-love btn-main" onclick="togglePlay()">
                <svg id="play-btn-svg" width="30" height="30" fill="currentColor" viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
            </div>

            <div class="btn-love" onclick="shootHearts()">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12.1,18.55L12,18.65L11.89,18.55C7.14,14.24 4,11.39 4,8.5C4,6.5 5.5,5 7.5,5C9.04,5 10.54,6 11.07,7.36H12.93C13.46,6 14.96,5 16.5,5C18.5,5 20,6.5 20,8.5C20,11.39 16.86,14.24 12.1,18.55M16.5,3C14.76,3 13.09,3.81 12,5.08C10.91,3.81 9.24,3 7.5,3C4.42,3 2,5.41 2,8.5C2,12.27 5.4,15.36 10.55,20.03L12,21.35L13.45,20.03C18.6,15.36 22,12.27 22,8.5C22,5.41 19.58,3 16.5,3Z"/></svg>
            </div>
        </div>

        <p class="footer-text">Para ti</p>
    </div>

    <script>
        const video = document.getElementById('player');
        const playBtn = document.getElementById('play-btn-svg');
        const seekBar = document.getElementById('seek-bar');
        const videoArea = document.getElementById('video-click-area');
        const card = document.getElementById('main-card');

        // Generar burbujas de fondo
        const pContainer = document.getElementById('particles-container');
        for (let i = 0; i < 15; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.width = p.style.height = (Math.random() * 6 + 2) + 'px';
            p.style.animationDelay = (Math.random() * 10) + 's';
            pContainer.appendChild(p);
        }

        function togglePlay() {
            if (video.paused) {
                video.play();
                playBtn.innerHTML = '<path d="M14,19H18V5H14M6,19H10V5H6V19Z"/>';
                videoArea.classList.remove('is-paused');
            } else {
                video.pause();
                playBtn.innerHTML = '<path d="M8,5.14V19.14L19,12.14L8,5.14Z"/>';
                videoArea.classList.add('is-paused');
            }
        }

        video.addEventListener('timeupdate', () => {
            const progress = (video.currentTime / video.duration) * 100;
            seekBar.style.width = progress + '%';
        });

        document.getElementById('seek-bar-container').addEventListener('click', (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            video.currentTime = pos * video.duration;
        });

        function toggleMute() {
            video.muted = !video.muted;
            document.getElementById('vol-icon').style.opacity = video.muted ? '0.5' : '1';
        }

        function shootHearts() {
            for(let i=0; i<3; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.style.position = 'absolute';
                heart.style.left = '50%';
                heart.style.bottom = '20%';
                heart.style.fontSize = '24px';
                heart.style.transition = 'all 1s ease-out';
                heart.style.pointerEvents = 'none';
                heart.style.zIndex = '100';
                
                card.appendChild(heart);
                
                setTimeout(() => {
                    heart.style.transform = `translate(${(Math.random()-0.5)*200}px, -300px) scale(${Math.random()+1}) rotate(${Math.random()*360}deg)`;
                    heart.style.opacity = '0';
                }, 10);
                
                setTimeout(() => heart.remove(), 1000);
            }
        }

        videoArea.addEventListener('click', togglePlay);

        // Iniciar en pausa visualmente
        videoArea.classList.add('is-paused');
    </script>
</body>
</html>
